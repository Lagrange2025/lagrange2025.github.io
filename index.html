<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人博客</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #F5F5F5; /* 亮白背景 */
            color: #333;
            margin: 0;
            padding: 0;
            scroll-behavior: smooth; /* 平滑滚动 */
        }
        header {
            background-color: #55CDFC; /* 淡蓝色 */
            color: white;
            padding: 15px 0;
            text-align: center;
            font-size: 24px;
        }
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background-color: #55CDFC; /* 淡蓝色 */
            padding: 10px 0;
            text-align: center;
            z-index: 1000;
        }
        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-size: 18px;
        }
        nav a:hover {
            text-decoration: underline;
        }
        .content {
            margin: 80px 20px 60px;
        }
        .section {
            margin-bottom: 40px;
        }
        .section h2 {
            border-bottom: 3px solid #F7A8B8; /* 淡粉色下划线 */
            padding-bottom: 5px;
        }
        .blog-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .blog-post {
            background: #FFFFFF; /* 纯白背景 */
            padding: 15px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .blog-post h3 {
            color: #F7A8B8; /* 淡粉色标题 */
            margin: 0 0 10px;
        }
        .blog-post p {
            margin: 0 0 10px;
        }
        .contact-info, .social-links {
            list-style-type: none;
            padding: 0;
        }
        .contact-info li, .social-links li {
            margin: 10px 0;
        }
        footer {
            background-color: #55CDFC; /* 淡蓝色 */
            color: white;
            text-align: center;
            padding: 15px;
            width: 100%;
            position: relative;
            bottom: 0;
        }

        /* 头像 + 个人介绍布局 */
        .about-container {
            display: flex;
            align-items: center;
            gap: 20px; /* 头像和文字之间的间距 */
        }
        .avatar {
            width: 100px; /* 头像大小 */
            height: 100px;
            border-radius: 50%; /* 圆形头像 */
            object-fit: cover;
            border: 3px solid #F7A8B8; /* 添加粉色边框 */
        }
    </style>
</head>
<body>

    <header>
        <h1>欢迎来到Lagrange的博客</h1>
    </header>

    <nav>
        <a href="#about">关于我</a>
        <a href="#blog">博客内容</a>
        <a href="#friends">友情链接</a>
        <a href="#contact">联系方式</a>
        <a href="#social">社交链接</a>
    </nav>

    <div class="content">
        <section id="about" class="section">
            <h2>关于我</h2>
            <div class="about-container">
                <img src="assets/pic/avatar.png" alt="avatar" class="avatar">
                <p>这里是Lagrange！</p>
            </div>
        </section>

        <section id="blog" class="section">
            <h2>博客内容</h2>
            <div class="blog-container">
                <div class="blog-post">
                    <h3>test</h3>
                    <p>test1</p>
                    <a href="assets/blogs/1.html">阅读全文</a>
                </div>
                <div class="blog-post">
                    <h3>www无</h3>
                    <p>无</p>
                    <a href="#">阅读全文</a>
                </div>
                <div class="blog-post">
                    <h3>无</h3>
                    <p>无</p>
                    <a href="#">阅读全文</a>
                </div>
            </div>
        </section>

        <section id="friends" class="section">
            <h2>友情链接</h2>
            <div class="friend-links">
                <a href="https://hhh2309.github.io" target="_blank" class="friend-card">猫猫的个人主页！</a>
            </div>
        </section>

        <style>
            .friend-links {
                display: flex;
                flex-wrap: wrap;
                gap: 15px;
                margin-top: 15px;
            }
            .friend-card {
                background: white;
                padding: 10px 15px;
                border-radius: 5px;
                box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
                text-decoration: none;
                color: #333;
                font-size: 16px;
                transition: 0.3s;
            }
            .friend-card:hover {
                background: #F7A8B8; /* 淡粉色 */
                color: white;
            }
        </style>

        <section id="contact" class="section">
            <h2>联系方式</h2>
            <ul class="contact-info">
                <li>QQ：1740959587</li>
            </ul>
        </section>

        <section id="social" class="section">
            <h2>社交链接</h2>
            <ul class="social-links">
                <li><a href="https://github.com/lagrange2025" target="_blank">GitHub</a></li>
            </ul>
        </section>
    </div>

    <footer>
        <p>&copy; 2025 Lagrange的博客 | All rights reserved</p>
    </footer>

</body>
</html>

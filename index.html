<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人博客</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #F5F5F5;
            color: #333;
            margin: 0;
            padding: 0;
            scroll-behavior: smooth;
            opacity: 0;
            animation: fadeIn 0.5s ease-in forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        header {
            background: linear-gradient(90deg, #F7A8B8, #55CDFC);
            color: white;
            padding: 15px 0;
            text-align: center;
            font-size: 24px;
        }

        nav {
            position: sticky;
            top: 0;
            width: 100%;
            background-color: #55CDFC;
            padding: 10px 0;
            text-align: center;
            z-index: 1000;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-size: 18px;
            transition: color 0.3s ease;
        }

        nav a:hover,
        nav a.active {
            font-weight: bold;
            text-decoration: underline;
        }

        .content {
            margin: 80px 20px 60px;
        }

        .section {
            margin-bottom: 40px;
        }

        .section h2 {
            background: linear-gradient(90deg, #F7A8B8, #55CDFC);
            color: white;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
        }

        .about-container {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #F7A8B8;
            transition: transform 0.6s ease-in-out;
        }

        .rotate {
            transform: rotate(360deg);
        }

        .blog-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .blog-post {
            background: #FFFFFF;
            padding: 15px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .blog-post:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
        }

        .blog-thumbnail {
            width: 120px;
            height: 80px;
            object-fit: cover;
            border-radius: 5px;
            flex-shrink: 0;
            cursor: pointer;
        }

        .blog-text {
            flex: 1;
        }

        .blog-post h3 {
            color: #F7A8B8;
            margin: 0 0 10px;
        }

        .friend-links {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 15px;
        }

        .friend-card {
            display: flex;
            align-items: center;
            gap: 10px;
            background: white;
            padding: 10px 15px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            text-decoration: none;
            color: #333;
            font-size: 16px;
            transition: 0.3s;
        }

        .friend-card:hover {
            background: #F7A8B8;
            color: white;
        }

        .friend-card img {
            width: 24px;
            height: 24px;
            border-radius: 50%;
        }

        #back-to-top {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #F7A8B8;
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            display: none;
            transition: opacity 0.3s;
            border: none;
            font-size: 18px;
        }

        #back-to-top:hover {
            background: #55CDFC;
        }
    </style>
</head>
<body>

    <header>
        <h1>欢迎来到Lagrange的博客</h1>
    </header>

    <nav>
        <a href="#about">关于我</a>
        <a href="#blog">博客内容</a>
        <a href="#friends">友情链接</a>
        <a href="#contact">联系方式</a>
        <a href="#social">社交链接</a>
    </nav>

    <div class="content">
        <section id="about" class="section">
            <h2>关于我</h2>
            <div class="about-container">
                <img src="assets/pic/avatar.png" alt="avatar" class="avatar" id="avatar">
                <p>这里是Lagrange！</p>
            </div>
        </section>

        <section id="blog" class="section">
            <h2>博客内容</h2>
            <div class="blog-container" id="blog-container">
                <!-- 博客文章将由 JavaScript 动态加载 -->
            </div>
        </section>

        <section id="friends" class="section">
            <h2>友情链接</h2>
            <div class="friend-links">
                <a href="https://hhh2309.github.io" target="_blank" class="friend-card">
                    <img src="assets/pic/hhh2309.png" alt="icon"> 猫猫的个人主页！
                </a>
            </div>
        </section>

        <section id="contact" class="section">
            <h2>联系方式</h2>
            <ul>
                <li>QQ：1740959587</li>
            </ul>
        </section>

        <section id="social" class="section">
            <h2>社交链接</h2>
            <ul>
                <li>
                    <a href="https://github.com/lagrange2025" target="_blank">
                        <span>GitHub</span>
                    </a>
                </li>
            </ul>
        </section>
    </div>

    <button id="back-to-top">↑</button>

    <footer>
        <p>&copy; 2025 Lagrange的博客 | All rights reserved</p>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const avatar = document.getElementById("avatar");
            const backToTop = document.getElementById("back-to-top");

            avatar.addEventListener("click", function () {
                avatar.classList.add("rotate");
                setTimeout(() => {
                    avatar.classList.remove("rotate");
                }, 600);
            });

            window.addEventListener("scroll", function () {
                backToTop.style.display = window.scrollY > 300 ? "block" : "none";
            });

            backToTop.addEventListener("click", function () {
                window.scrollTo({ top: 0, behavior: "smooth" });
            });

            const blogContainer = document.getElementById("blog-container");
            fetch("assets/blogs/blog_list.json")
                .then(response => response.json())
                .then(data => {
                    data.forEach(post => {
                        blogContainer.innerHTML += `
                            <div class="blog-post">
                                <img src="${post.image}" class="blog-thumbnail" onclick="window.open('${post.link}', '_blank')">
                                <div class="blog-text">
                                    <h3>${post.title}</h3>
                                    <p>${post.desc}</p>
                                    <a href="${post.link}" target="_blank">阅读全文</a>
                                </div>
                            </div>`;
                    });
                })
                .catch(error => console.error("加载博客列表失败:", error));
        });
    </script>

</body>
</html>

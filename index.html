<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人博客</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            color: #333;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #333;
            color: white;
            padding: 10px 0;
            text-align: center;
        }
        nav {
            text-align: center;
            background-color: #444;
            padding: 10px 0;
        }
        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-size: 18px;
        }
        nav a:hover {
            text-decoration: underline;
        }
        .content {
            margin: 20px;
        }
        .section {
            margin-bottom: 30px;
        }
        .section h2 {
            border-bottom: 2px solid #333;
            padding-bottom: 5px;
        }
        .contact-info, .social-links {
            list-style-type: none;
            padding: 0;
        }
        .contact-info li, .social-links li {
            margin: 10px 0;
        }
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 15px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>
    <header>
        <h1>欢迎来到我的博客</h1>
    </header>

    <nav>
        <a href="#about">关于我</a>
        <a href="#portfolio">作品</a>
        <a href="#contact">联系方式</a>
        <a href="#social">社交链接</a>
    </nav>

    <div class="content">
        <section id="about" class="section">
            <h2>关于我</h2>
            <p>这里是Lagrange！</p>
        </section>

        <section id="portfolio" class="section">
            <h2>作品</h2>
            <p>展示一些你的作品，可能是项目、文章或其他你想分享的内容。</p>
            <ul>
                <li>喵！</li>
                <li>喵喵！</li>
                <li>喵喵喵！</li>
            </ul>
        </section>

        <section id="contact" class="section">
            <h2>联系方式</h2>
            <ul class="contact-info">
                <li>Email: private</li>
            </ul>
        </section>

        <section id="social" class="section">
            <h2>社交链接</h2>
            <ul class="social-links">
                <li><a href="https://www.linkedin.com" target="_blank">LinkedIn</a></li>
                <li><a href="https://github.com/lagrange2025" target="_blank">GitHub</a></li>
                <li><a href="https://www.instagram.com" target="_blank">Instagram</a></li>
            </ul>
        </section>
    </div>

    <footer>
        <p>&copy; 2025 个人博客 | 所有权利保留</p>
    </footer>
</body>
</html>

<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人博客</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #F5F5F5;
            color: #333;
            margin: 0;
            padding: 0;
            scroll-behavior: smooth;
        }
        header {
            background-color: #55CDFC;
            color: white;
            padding: 15px 0;
            text-align: center;
            font-size: 24px;
        }
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background-color: #55CDFC;
            padding: 10px 0;
            text-align: center;
            z-index: 1000;
        }
        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-size: 18px;
        }
        nav a:hover {
            text-decoration: underline;
        }
        .content {
            margin: 80px 20px 60px;
        }
        .section {
            margin-bottom: 40px;
        }
        .section h2 {
            border-bottom: 3px solid #F7A8B8;
            padding-bottom: 5px;
        }

        /* 博客文章布局 */
        .blog-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .blog-post {
            display: flex;
            align-items: center;
            background: #FFFFFF;
            padding: 15px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            gap: 15px;
        }
        .thumbnail {
            width: 150px;
            height: 100px;
            border-radius: 5px;
            object-fit: cover;
        }
        .blog-content {
            flex: 1;
        }
        .blog-post h3 {
            color: #F7A8B8;
            margin: 0 0 10px;
        }
        .blog-post p {
            margin: 0 0 10px;
        }
        .contact-info, .social-links {
            list-style-type: none;
            padding: 0;
        }
        .contact-info li, .social-links li {
            margin: 10px 0;
        }
        footer {
            background-color: #55CDFC;
            color: white;
            text-align: center;
            padding: 15px;
            width: 100%;
            position: relative;
            bottom: 0;
        }
    </style>
</head>
<body>

    <header>
        <h1>欢迎来到Lagrange的博客</h1>
    </header>

    <nav>
        <a href="#about">关于我</a>
        <a href="#blog">博客内容</a>
        <a href="#friends">友情链接</a>
        <a href="#contact">联系方式</a>
        <a href="#social">社交链接</a>
    </nav>

    <div class="content">
        <section id="about" class="section">
            <h2>关于我</h2>
            <div class="about-container">
                <img src="assets/pic/avatar.png" alt="avatar" class="avatar">
                <p>这里是Lagrange！</p>
            </div>
        </section>

        <section id="blog" class="section">
            <h2>博客内容</h2>
            <div class="blog-container">
                <div class="blog-post">
                    <img src="assets/pic/blog1.jpg" alt="博客缩略图1" class="thumbnail">
                    <div class="blog-content">
                        <h3>博客文章标题 1</h3>
                        <p>这是第一篇博客的摘要内容...</p>
                        <a href="1.html">阅读全文</a>
                    </div>
                </div>
                <div class="blog-post">
                    <img src="assets/pic/blog2.jpg" alt="博客缩略图2" class="thumbnail">
                    <div class="blog-content">
                        <h3>博客文章标题 2</h3>
                        <p>这是第二篇博客的摘要内容...</p>
                        <a href="#">阅读全文</a>
                    </div>
                </div>
                <div class="blog-post">
                    <img src="assets/pic/blog3.jpg" alt="博客缩略图3" class="thumbnail">
                    <div class="blog-content">
                        <h3>博客文章标题 3</h3>
                        <p>这是第三篇博客的摘要内容...</p>
                        <a href="#">阅读全文</a>
                    </div>
                </div>
            </div>
        </section>

        <section id="friends" class="section">
            <h2>友情链接</h2>
            <div class="friend-links">
                <a href="https://hhh2309.github.io" target="_blank" class="friend-card">猫猫的个人主页！</a>
            </div>
        </section>

        <section id="contact" class="section">
            <h2>联系方式</h2>
            <ul class="contact-info">
                <li>QQ：1740959587</li>
            </ul>
        </section>

        <section id="social" class="section">
            <h2>社交链接</h2>
            <ul class="social-links">
                <li><a href="https://github.com/lagrange2025" target="_blank">GitHub</a></li>
            </ul>
        </section>
    </div>

    <footer>
        <p>&copy; 2025 Lagrange的博客 | All rights reserved</p>
    </footer>

</body>
</html>

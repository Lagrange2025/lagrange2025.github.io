<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人博客</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #F5F5F5;
            color: #333;
            margin: 0;
            padding: 0;
            scroll-behavior: smooth;
            opacity: 0;
            animation: fadeIn 0.5s ease-in forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        header {
            background-color: #55CDFC;
            color: white;
            padding: 15px 0;
            text-align: center;
            font-size: 24px;
        }

        nav {
            position: sticky;
            top: 0;
            width: 100%;
            background-color: #55CDFC;
            padding: 10px 0;
            text-align: center;
            z-index: 1000;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-size: 18px;
            transition: color 0.3s ease;
        }

        nav a:hover,
        nav a.active {
            font-weight: bold;
            text-decoration: underline;
        }

        .content {
            margin: 80px 20px 60px;
        }

        .section {
            margin-bottom: 40px;
        }

        .section h2 {
            border-bottom: 3px solid #F7A8B8;
            padding-bottom: 5px;
        }

        /* 头像 */
        .about-container {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #F7A8B8;
            transition: transform 0.6s ease-in-out;
        }

        /* 旋转动画 */
        .rotate {
            transform: rotate(360deg);
        }

        /* 博客列表 */
        .blog-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .blog-post {
            background: #FFFFFF;
            padding: 15px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .blog-post:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
        }

        .blog-post h3 {
            color: #F7A8B8;
            margin: 0 0 10px;
        }

        .blog-post p {
            margin: 0 0 10px;
        }

        /* 友情链接 */
        .friend-links {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 15px;
        }

        .friend-card {
            display: flex;
            align-items: center;
            gap: 10px;
            background: white;
            padding: 10px 15px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            text-decoration: none;
            color: #333;
            font-size: 16px;
            transition: 0.3s;
        }

        .friend-card:hover {
            background: #F7A8B8;
            color: white;
        }

        .friend-card img {
            width: 24px;
            height: 24px;
            border-radius: 50%;
        }

        /* 返回顶部按钮 */
        #back-to-top {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #F7A8B8;
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            display: none;
            transition: opacity 0.3s;
            border: none;
            font-size: 18px;
        }

        #back-to-top:hover {
            background: #55CDFC;
        }
    </style>
</head>
<body>

    <header>
        <h1>欢迎来到Lagrange的博客</h1>
    </header>

    <nav>
        <a href="#about">关于我</a>
        <a href="#blog">博客内容</a>
        <a href="#friends">友情链接</a>
        <a href="#contact">联系方式</a>
        <a href="#social">社交链接</a>
    </nav>

    <div class="content">
        <section id="about" class="section">
            <h2>关于我</h2>
            <div class="about-container">
                <img src="assets/pic/avatar.png" alt="avatar" class="avatar" id="avatar">
                <p>这里是Lagrange！</p>
            </div>
        </section>

        <section id="blog" class="section">
            <h2>博客内容</h2>
            <div class="blog-container">
                <div class="blog-post">
                    <h3>test</h3>
                    <p>test1</p>
                    <a href="assets/blogs/1.html">阅读全文</a>
                </div>
                <div class="blog-post">
                    <h3>www无</h3>
                    <p>无</p>
                    <a href="#">阅读全文</a>
                </div>
                <div class="blog-post">
                    <h3>无</h3>
                    <p>无</p>
                    <a href="#">阅读全文</a>
                </div>
            </div>
        </section>

        <section id="friends" class="section">
            <h2>友情链接</h2>
            <div class="friend-links">
                <a href="https://hhh2309.github.io" target="_blank" class="friend-card">
                    <img src="https://hhh2309.github.io/favicon.ico" alt="icon"> 猫猫的个人主页！
                </a>
            </div>
        </section>

        <section id="contact" class="section">
            <h2>联系方式</h2>
            <ul>
                <li>QQ：1740959587</li>
            </ul>
        </section>

        <section id="social" class="section">
            <h2>社交链接</h2>
            <ul>
                <li>
                    <a href="https://github.com/lagrange2025" target="_blank">
                        <span>GitHub</span>
                    </a>
                </li>
            </ul>
        </section>
    </div>

    <button id="back-to-top">↑</button>

    <footer>
        <p>&copy; 2025 Lagrange的博客 | All rights reserved</p>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const sections = document.querySelectorAll("section");
            const navLinks = document.querySelectorAll("nav a");
            const avatar = document.getElementById("avatar");
            const backToTop = document.getElementById("back-to-top");

            window.addEventListener("scroll", function () {
                let current = "";

                sections.forEach((section) => {
                    const sectionTop = section.offsetTop - 60;
                    if (window.scrollY >= sectionTop) {
                        current = section.getAttribute("id");
                    }
                });

                navLinks.forEach((link) => {
                    link.classList.remove("active");
                    if (link.getAttribute("href") === `#${current}`) {
                        link.classList.add("active");
                    }
                });

                if (window.scrollY > 300) {
                    backToTop.style.display = "block";
                } else {
                    backToTop.style.display = "none";
                }
            });

            avatar.addEventListener("click", function () {
                avatar.classList.add("rotate");
                setTimeout(() => {
                    avatar.classList.remove("rotate");
                }, 600);
            });

            backToTop.addEventListener("click", () => {
                window.scrollTo({ top: 0, behavior: "smooth" });
            });
        });
    </script>

</body>
</html>
